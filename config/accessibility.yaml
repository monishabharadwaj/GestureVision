accessibility:
  default_profile: "dandelion"
  voice_listen_seconds: 15
  beauty_listen_seconds: 30
  voice_trigger_words: ["beauty", "i am beauty", "i'm beauty", "beauty mode"]

  voice_commands:
    chrome: ["chrome", "open chrome", "google", "open google", "browser"]
    edge: ["edge", "open edge", "microsoft edge"]
    firefox: ["firefox", "open firefox", "mozilla"]
    youtube: ["youtube", "open youtube", "you tube", "play youtube", "video"]
    music: ["music", "play music", "song", "spotify", "play song"]
    paint: ["paint", "brush", "open paint", "drawing", "draw"]
    menu: ["menu", "open menu", "navigation"]
    help: ["help", "what next", "what do i do", "instructions"]
    learn: ["learn", "teach me", "explain", "what is", "i want to learn"]
    original: ["original", "normal", "camera", "live view", "exit paint", "leave paint"]

  apps:
    chrome:
      label: "Chrome"
      url: "https://www.google.com"
    edge:
      label: "Edge"
      url: "https://www.microsoft.com/edge"
    firefox:
      label: "Firefox"
      url: "https://www.mozilla.org/firefox"
    youtube:
      label: "YouTube"
      url: "https://www.youtube.com"
    music:
      label: "Music"
      url: "https://www.youtube.com"

  onboarding:
    spoken_prompt: >
      Welcome to GestureVision.
      If you cannot see the screen, say Beauty now.
      Your camera will start automatically.
    dandelion_title: "DANDELION — Visual Mode (for deaf users)"
    dandelion_instructions: >
      You CAN see this screen.
      Click ENTER DANDELION MODE or wait for countdown.
      The app will show large text — no sound needed.
      You can also speak what you want.
    dandelion_button: "ENTER DANDELION MODE"
    beauty_hint: "Blind users: say BEAUTY aloud — no clicking needed"

  profiles:
    beauty:
      display_name: "Beauty"
      subtitle: "Audio-only — hear everything, speak back"
      tts_enabled: true
      visual_captions: false
      audio_only: true
      hide_video: true
      simplified_ui: true
      auto_start_camera: true
      theme: "accessibility_high_contrast"
      welcome: >
        Beauty mode. Camera starting.
        Rock sign for music — say the song and it plays directly.
        Peace sign to learn — I will explain out loud.
        OK sign for anything else.
        Pinch or fist pauses. Thumbs up saves a photo.
      reduced_effects: []
      gestures:
        thumbs_up:
          action: "capture_screenshot"
          debounce_frames: 5
        closed_fist:
          action: "toggle_pause"
          debounce_frames: 4
        pinch:
          action: "toggle_pause"
          debounce_frames: 4
        rock_sign:
          action: "start_music_chat"
          debounce_frames: 5
        peace:
          action: "start_learn_chat"
          debounce_frames: 5
        ok_sign:
          action: "start_free_chat"
          debounce_frames: 5

    dandelion:
      display_name: "Dandelion"
      subtitle: "Visual mode — read, speak, touch, gestures"
      tts_enabled: false
      visual_captions: true
      caption_duration_ms: 6000
      audio_only: false
      hide_video: false
      simplified_ui: true
      auto_start_camera: true
      auto_hand_mesh: true
      picture_mode: true
      theme: "accessibility_high_contrast"
      welcome: >
        DANDELION PICTURE MODE — no reading needed.
        Look at the POSE strip (hand shapes) and PICTURE board (icons).
        🤘 = music  |  ✌ = learn  |  👌 = ask  |  👍 = paint  |  ☝ = touch  |  🙌 = 3D mesh.
      reduced_effects:
        - original
        - brush
        - hand_mesh
      gesture_menu:
        - chrome
        - youtube
        - edge
        - firefox
        - music
        - paint
      touch_bar:
        - chrome
        - youtube
        - music
        - paint
        - edge
      # LIVE MODE — navigation, music, learning (not painting)
      gestures:
        index_finger:
          action: "track_cursor"
          debounce_frames: 0
        rock_sign:
          action: "start_music_chat"
          debounce_frames: 8
        peace:
          action: "start_learn_chat"
          debounce_frames: 8
        ok_sign:
          action: "start_free_chat"
          debounce_frames: 8
        thumbs_up:
          action: "enter_paint_mode"
          debounce_frames: 8
        closed_fist:
          action: "exit_paint_mode"
          debounce_frames: 8
      # PAINT MODE — only active inside paint studio (code override)
      paint_gestures:
        index_finger: "draw on your face"
        pinch: "change brush size"
        ok_sign: "cycle brush type (neon, 3D, sparkle, soft)"
        rock_sign: "cycle ink color"
        peace: "cycle background (live, sketch, edge)"
        thumbs_up: "place 3D object"
        closed_fist: "clear canvas"
        x_sign: "painting done — exit to live mode"

  messages:
    gestures:
      index_finger: "Touch bar — point and hold"
      peace: "LEARNING — speak your topic"
      pinch: "Brush size"
      thumbs_up: "PAINT studio"
      closed_fist: "Back to live mode"
      ok_sign: "Ask anything"
      rock_sign: "YOUTUBE MUSIC — say a song"
      x_sign: "Painting done"
    actions:
      switch_effect: "Switched to {target}"
      capture_screenshot: "Screenshot saved"
      toggle_pause: "Paused. Show fist or pinch again to resume."
      adjust_parameter: "Brush size changed"
      launch_app: "Opening {target}"
      open_menu: "Menu open"
      menu_next: "Next: {target}"
      menu_select: "Opening {target}"
      close_menu: "Menu closed"
      speak_help: "Say what you want — music, learn, or open an app"
      speak_status: "Camera active"
      start_music_chat: "YouTube music — what song would you like?"
      start_learn_chat: "Learning — what topic?"
      start_free_chat: "Tell me what you want"
      enter_paint_mode: "Paint studio — draw on your face"
      exit_paint_mode: "Live mode — rock=music, peace=learn, ok=ask"
    events:
      hand_acquired: "Hand detected"
      hand_lost: "Hand lost — show your hand again"
      camera_started: "Camera started"
      camera_stopped: "Camera stopped"
      resumed: "Resumed"
      effect_changed: "Now using {effect}"
