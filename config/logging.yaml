version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  detailed:
    format: "%(asctime)s | %(levelname)-8s | %(name)s:%(lineno)d | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/gesturevision.log
    maxBytes: 5242880
    backupCount: 3
    encoding: utf-8

root:
  level: INFO
  handlers: [console, file]

loggers:
  gesturevision:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  gesturevision.performance:
    level: INFO
    handlers: [console, file]
    propagate: false
